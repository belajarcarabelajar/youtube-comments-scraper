name: Compliance Checks

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  license-check:
    name: License Metadata Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for LICENSE file
        run: |
          if [ ! -f "LICENSE" ]; then
            echo "LICENSE file is missing!"
            exit 1
          fi
      - name: Check package.json license
        run: |
          LICENSE=$(jq -r .license package.json)
          if [ "$LICENSE" = "null" ] || [ "$LICENSE" = "" ] || [ "$LICENSE" = "private" ]; then
            echo "package.json is missing a valid license or is marked private"
            exit 1
          fi
          PRIVATE=$(jq -r .private package.json)
          if [ "$PRIVATE" = "true" ]; then
            echo "package.json is marked as private: true"
            exit 1
          fi
